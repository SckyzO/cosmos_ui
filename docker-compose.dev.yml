services:
  demo:
    build:
      context: ./demo
      dockerfile: Dockerfile
    ports:
      - "5174:5173"
    volumes:
      - ./demo:/app
      - ./packages/react/src:/app/src/cosmos
      - ./styles:/app/styles
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

  storybook:
    build:
      context: ./.storybook
      dockerfile: Dockerfile
    ports:
      - "6006:6006"
    volumes:
      # Source: component files (hot-reload on changes)
      - ./packages/react/src:/app/src/cosmos
      - ./styles:/app/styles
      # Config: stories, main.ts, preview.tsx (hot-reload)
      - ./.storybook/stories:/app/.storybook/stories
      - ./.storybook/main.ts:/app/.storybook/main.ts
      - ./.storybook/preview.tsx:/app/.storybook/preview.tsx
      - ./.storybook/global.css:/app/.storybook/global.css
      - ./.storybook/cosmos-theme.ts:/app/.storybook/cosmos-theme.ts
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
