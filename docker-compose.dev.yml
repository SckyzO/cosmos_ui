services:
  demo:
    build:
      context: ./demo
      dockerfile: Dockerfile
    ports:
      - "5174:5173"
    volumes:
      - ./demo:/app
      - ./packages/react/src:/app/src/cosmos
      - ./styles:/app/styles
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

  storybook:
    build:
      context: ./.storybook
      dockerfile: Dockerfile
    ports:
      - "6006:6006"
    volumes:
      # WORKDIR is /app/.storybook — node_modules live there.
      # Source files are mounted directly into the WORKDIR.
      # __dirname in main.ts = /app/.storybook (same as node_modules parent).
      - ./packages/react/src:/app/packages/react/src
      - ./styles:/app/styles
      # Config files mounted INTO the WORKDIR (not a subdirectory)
      - ./.storybook/stories:/app/.storybook/stories
      - ./.storybook/main.ts:/app/.storybook/main.ts
      - ./.storybook/preview.tsx:/app/.storybook/preview.tsx
      - ./.storybook/global.css:/app/.storybook/global.css
      - ./.storybook/cosmos-theme.ts:/app/.storybook/cosmos-theme.ts
      - /app/.storybook/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
